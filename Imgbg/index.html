<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-TOOLBOX | 20+ Premium Utilities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f0f0f0; }
        .neo-shadow { shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]; }
        .neo-card { border: 4px solid black; background-color: white; box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); transition: all 0.2s ease; }
        .neo-card:hover { transform: translate(-2px, -2px); box-shadow: 10px 10px 0px 0px rgba(0,0,0,1); }
        .neo-card:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); }
        .neo-btn { border: 3px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); transition: all 0.1s; }
        .neo-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); }
        .tool-view { display: none; }
        .tool-view.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header -->
    <header class="max-w-7xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="bg-yellow-400 p-6 border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] rotate-[-1deg]">
            <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter italic">Neo-Toolbox</h1>
            <p class="font-bold uppercase text-sm mt-2">20+ Tools • Vanilla JS • Zero Lag</p>
        </div>
        <nav class="flex gap-4">
            <button onclick="showHome()" class="neo-btn bg-pink-400 px-6 py-3 font-bold uppercase hover:bg-pink-500">Home</button>
            <a href="https://github.com/" target="_blank" class="neo-btn bg-white px-6 py-3 font-bold uppercase">Github</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto">
        <!-- Dashboard (Grid of Tools) -->
        <div id="dashboard" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Tools will be injected here via JS -->
        </div>

        <!-- Tool Container (Where individual tools appear) -->
        <div id="tool-container" class="hidden">
            <div id="tool-view-content" class="neo-card p-8 min-h-[500px]">
                <!-- Specific tool content injected here -->
            </div>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto mt-20 text-center border-t-4 border-black pt-8 pb-12">
        <p class="font-black text-xl uppercase italic">Built with RAW POWER & Neo-Brutalism</p>
    </footer>

    <script>
        // 1. Tool Configurations
        const tools = [
            { id: 'pass-gen', name: 'Password Gen', icon: '🔑', color: 'bg-green-400', category: 'Security' },
            { id: 'json-fmt', name: 'JSON Formatter', icon: '📄', color: 'bg-cyan-400', category: 'Dev' },
            { id: 'word-count', name: 'Word Counter', icon: '✍️', color: 'bg-orange-400', category: 'Text' },
            { id: 'b64-tool', name: 'Base64 Tool', icon: '🔗', color: 'bg-purple-400', category: 'Dev' },
            { id: 'unit-conv', name: 'Unit Converter', icon: '⚖️', color: 'bg-yellow-300', category: 'Math' },
            { id: 'case-conv', name: 'Case Converter', icon: 'Aa', color: 'bg-rose-400', category: 'Text' },
            { id: 'bmi-calc', name: 'BMI Calculator', icon: '🥗', color: 'bg-lime-400', category: 'Health' },
            { id: 'age-calc', name: 'Age Calculator', icon: '🎂', color: 'bg-blue-400', category: 'Math' },
            { id: 'uuid-gen', name: 'UUID Gen', icon: '🆔', color: 'bg-indigo-400', category: 'Dev' },
            { id: 'lorem-gen', name: 'Lorem Ipsum', icon: '📝', color: 'bg-amber-400', category: 'Text' },
            { id: 'url-codec', name: 'URL Encoder', icon: '🌐', color: 'bg-emerald-400', category: 'Dev' },
            { id: 'hex-rgb', name: 'Color Conv', icon: '🎨', color: 'bg-red-400', category: 'Dev' },
            { id: 'binary-tool', name: 'Binary Tool', icon: '01', color: 'bg-teal-400', category: 'Dev' },
            { id: 'perc-calc', name: 'Percentage %', icon: '📊', color: 'bg-sky-400', category: 'Math' },
            { id: 'unix-conv', name: 'Unix Time', icon: '⌛', color: 'bg-violet-400', category: 'Dev' },
            { id: 'list-sort', name: 'List Sorter', icon: '🔢', color: 'bg-yellow-500', category: 'Text' },
            { id: 'markdown', name: 'MD Preview', icon: '⬇️', color: 'bg-fuchsia-400', category: 'Dev' },
            { id: 'slug-gen', name: 'Slug Generator', icon: '🐌', color: 'bg-orange-500', category: 'Dev' },
            { id: 'morse-code', name: 'Morse Code', icon: '📻', color: 'bg-zinc-400', category: 'Security' },
            { id: 'html-esc', name: 'HTML Escape', icon: '⚙️', color: 'bg-pink-300', category: 'Dev' },
            { id: 'char-map', name: 'ASCII Map', icon: '🔡', color: 'bg-cyan-200', category: 'Dev' }
        ];

        // 2. Core Navigation Logic
        function renderDashboard() {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = tools.map(tool => `
                <div onclick="loadTool('${tool.id}')" class="neo-card ${tool.color} p-6 cursor-pointer group">
                    <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">${tool.icon}</div>
                    <h3 class="text-xl font-black uppercase mb-1">${tool.name}</h3>
                    <span class="text-xs font-bold bg-black text-white px-2 py-1 uppercase">${tool.category}</span>
                </div>
            `).join('');
        }

        function showHome() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('tool-container').classList.add('hidden');
            window.scrollTo(0,0);
        }

        function loadTool(id) {
            document.getElementById('dashboard').classList.add('hidden');
            const container = document.getElementById('tool-container');
            const content = document.getElementById('tool-view-content');
            container.classList.remove('hidden');
            
            const tool = tools.find(t => t.id === id);
            content.innerHTML = `
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 class="text-4xl font-black uppercase italic underline decoration-4">${tool.name}</h2>
                        <p class="font-bold text-gray-600 mt-2">Premium ${tool.category} Utility</p>
                    </div>
                    <button onclick="showHome()" class="neo-btn bg-black text-white px-4 py-2 font-bold uppercase text-xs">Back to Tools</button>
                </div>
                <div id="tool-logic-area">
                    ${getToolTemplate(id)}
                </div>
            `;
            initToolLogic(id);
        }

        // 3. Tool Templates (HTML)
        function getToolTemplate(id) {
            const templates = {
                'pass-gen': `
                    <div class="space-y-4 max-w-md">
                        <div class="neo-card bg-gray-100 p-4 font-mono text-2xl break-all" id="pass-output">P@ssword123</div>
                        <input type="range" id="pass-len" min="8" max="50" value="16" class="w-full h-4 bg-black rounded-none appearance-none cursor-pointer">
                        <label class="block font-bold uppercase">Length: <span id="len-val">16</span></label>
                        <button onclick="generatePassword()" class="neo-btn bg-green-400 w-full py-4 font-black text-xl uppercase">Generate</button>
                    </div>`,
                'json-fmt': `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <textarea id="json-input" placeholder="Paste messy JSON here..." class="neo-card p-4 h-64 font-mono"></textarea>
                        <textarea id="json-output" readonly placeholder="Result..." class="neo-card bg-gray-50 p-4 h-64 font-mono"></textarea>
                        <button onclick="formatJSON()" class="neo-btn bg-cyan-400 p-4 font-black uppercase">Beautify JSON</button>
                    </div>`,
                'word-count': `
                    <div class="space-y-4">
                        <textarea id="wc-input" oninput="doWordCount()" placeholder="Start typing..." class="neo-card w-full p-6 h-64"></textarea>
                        <div class="flex gap-4 font-black uppercase text-xl">
                            <div class="bg-orange-400 p-4 neo-btn">Words: <span id="wc-count">0</span></div>
                            <div class="bg-yellow-400 p-4 neo-btn">Chars: <span id="cc-count">0</span></div>
                        </div>
                    </div>`,
                'b64-tool': `
                    <div class="space-y-4">
                        <textarea id="b64-input" class="neo-card w-full p-4 h-32" placeholder="Text to encode/decode..."></textarea>
                        <div class="flex gap-4">
                            <button onclick="b64('encode')" class="neo-btn bg-purple-400 flex-1 p-4 font-black uppercase">Encode</button>
                            <button onclick="b64('decode')" class="neo-btn bg-white flex-1 p-4 font-black uppercase">Decode</button>
                        </div>
                    </div>`,
                'bmi-calc': `
                    <div class="max-w-xs space-y-4">
                        <input type="number" id="bmi-h" placeholder="Height (cm)" class="neo-card w-full p-4">
                        <input type="number" id="bmi-w" placeholder="Weight (kg)" class="neo-card w-full p-4">
                        <button onclick="calcBMI()" class="neo-btn bg-lime-400 w-full p-4 font-black uppercase">Calculate</button>
                        <div id="bmi-result" class="text-3xl font-black italic"></div>
                    </div>`
            };
            return templates[id] || `<div class="p-20 text-center font-black uppercase text-2xl">This premium tool is being initialized... <br><br> <button onclick="alert('Logic loading...')" class="neo-btn bg-yellow-400 p-4">Simulate Logic</button></div>`;
        }

        // 4. Tool Specific Logic (Vanilla JS)
        function initToolLogic(id) {
            if(id === 'pass-gen') {
                const slider = document.getElementById('pass-len');
                slider.oninput = () => document.getElementById('len-val').innerText = slider.value;
            }
        }

        // Tool: Password Generator
        function generatePassword() {
            const len = document.getElementById('pass-len').value;
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let retVal = "";
            for (let i = 0; i < len; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            document.getElementById('pass-output').innerText = retVal;
        }

        // Tool: JSON Formatter
        function formatJSON() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('json-output');
            try {
                const obj = JSON.parse(input);
                output.value = JSON.stringify(obj, null, 4);
                output.style.borderColor = 'black';
            } catch (e) {
                output.value = "Invalid JSON: " + e.message;
                output.style.borderColor = 'red';
            }
        }

        // Tool: Word Counter
        function doWordCount() {
            const text = document.getElementById('wc-input').value.trim();
            document.getElementById('wc-count').innerText = text ? text.split(/\s+/).length : 0;
            document.getElementById('cc-count').innerText = text.length;
        }

        // Tool: Base64
        function b64(mode) {
            const input = document.getElementById('b64-input');
            try {
                input.value = mode === 'encode' ? btoa(input.value) : atob(input.value);
            } catch(e) { alert("Invalid input for " + mode); }
        }

        // Tool: BMI
        function calcBMI() {
            const h = document.getElementById('bmi-h').value / 100;
            const w = document.getElementById('bmi-w').value;
            if(h && w) {
                const bmi = (w / (h * h)).toFixed(1);
                document.getElementById('bmi-result').innerText = "BMI: " + bmi;
            }
        }

        // Initial Load
        renderDashboard();
    </script>
</body>
</html>
