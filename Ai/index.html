<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hixvy AI - Professional Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-300">

    <div class="main-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="flex-grow">
                <button id="newChatBtn" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-700/50 transition-colors">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>
            
            <!-- User Profile & Settings -->
            <div class="border-t border-gray-700 pt-4 space-y-2 text-sm">
                <button id="devInfoBtn" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-700/50 transition-colors">
                    <i class="fas fa-code w-4 text-center"></i> Developer
                </button>
                <div id="userProfile" class="hidden items-center gap-3 px-3 py-2">
                    <i class="fas fa-user-circle w-4 text-center"></i>
                    <span id="userEmail" class="truncate"></span>
                </div>
                 <button id="logoutBtn" class="hidden w-full flex items-center gap-3 px-3 py-2 rounded-lg text-red-400 hover:bg-red-900/50 transition-colors">
                    <i class="fas fa-sign-out-alt w-4 text-center"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="chat-container">
            <!-- Header -->
            <header class="p-4 flex items-center justify-between z-20 flex-shrink-0 md:justify-end">
                <button id="mobileMenuBtn" class="md:hidden w-10 h-10 rounded-full hover:bg-gray-700/50 flex items-center justify-center transition-colors text-slate-400">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="text-lg font-bold tracking-tight md:hidden">The Hixvy AI</h1>
                <button id="speakerButton" class="w-10 h-10 rounded-full hover:bg-gray-700/50 flex items-center justify-center transition-colors text-slate-400">
                    <i class="fas fa-volume-up"></i>
                </button>
            </header>

            <main id="chatbox" class="flex-grow overflow-y-auto p-4 lg:px-8 space-y-6 chatbox scroll-smooth">
                <!-- Welcome Message (dynamically added) -->
            </main>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="hidden px-6 pb-2">
                <div class="flex items-center gap-2 bg-gray-800 px-4 py-3 rounded-2xl rounded-bl-none border border-gray-700 shadow-lg w-fit">
                    <div class="typing-dot w-2 h-2 rounded-full"></div>
                    <div class="typing-dot w-2 h-2 rounded-full"></div>
                    <div class="typing-dot w-2 h-2 rounded-full"></div>
                </div>
            </div>

            <!-- Input Form -->
            <footer class="input-area">
                <form id="chatForm" class="w-full max-w-3xl mx-auto flex gap-2 items-end relative">
                    <div class="flex items-center gap-1 bg-gray-800 rounded-full p-1 border border-gray-700">
                        <button id="cameraButton" type="button" class="p-2.5 text-slate-400 hover:text-violet-400 transition-colors rounded-full hover:bg-gray-700" title="Open Camera"><i class="fas fa-camera"></i></button>
                        <button id="galleryButton" type="button" class="p-2.5 text-slate-400 hover:text-violet-400 transition-colors rounded-full hover:bg-gray-700" title="Upload Image"><i class="fas fa-image"></i></button>
                        <button id="genImageButton" type="button" class="p-2.5 text-slate-400 hover:text-violet-400 transition-colors rounded-full hover:bg-gray-700" title="Generate Image"><i class="fas fa-wand-magic-sparkles"></i></button>
                    </div>

                    <div class="flex-grow relative">
                        <textarea id="chatInput" class="w-full bg-gray-800 border border-gray-700 rounded-2xl py-3 pl-4 pr-24 text-sm focus:ring-2 focus:ring-violet-500 focus:outline-none transition-all shadow-inner placeholder-gray-500 resize-none" placeholder="Message Hixvy AI..." rows="1"></textarea>
                        <button id="micButton" type="button" class="absolute right-12 top-1/2 -translate-y-1/2 text-slate-400 hover:text-violet-400 p-1" title="Activate Mia Voice Assistant"><i class="fas fa-microphone"></i></button>
                         <button id="sendButton" type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 bg-gray-700 text-white rounded-full flex-shrink-0 hover:bg-violet-600 transition-all flex items-center justify-center disabled:opacity-50"><i class="fas fa-paper-plane text-sm"></i></button>
                    </div>
                     <input type="file" id="imageUpload" accept="image/*" class="hidden">
                </form>
            </footer>
        </div>
    </div>
    
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/50 z-50 md:hidden"></div>

    <!-- Modals -->
    <div id="mediaModal" class="hidden fixed inset-0 z-50 flex flex-col modal-overlay"></div>
    <div id="developerModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay"></div>
    <div id="guestLimitModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay"></div>


    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <!-- App Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
