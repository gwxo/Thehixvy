<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCC AI - Professional Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Tesseract.js (OCR) -->
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    
    <!-- Cropper.js (Image Cropping) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Global Styles --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Scrollbar --- */
        .chatbox::-webkit-scrollbar { width: 6px; }
        .chatbox::-webkit-scrollbar-track { background: transparent; }
        .chatbox::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        
        /* --- Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim { animation: fadeIn 0.3s ease-out forwards; }

        /* --- Typing Indicator --- */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
            background-color: #6366f1; /* Indigo-500 */
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* --- Glassmorphism Elements --- */
        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }

        /* --- Cropper Fixes --- */
        .cropper-view-box, .cropper-face { border-radius: 0; }
        .cropper-modal { background-color: rgba(0, 0, 0, 0.85); }
    </style>
</head>
<body class="flex flex-col h-screen text-slate-800">

    <!-- Header -->
    <header class="glass-header py-3 px-4 flex items-center justify-between z-20 flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <i class="fas fa-brain text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800 tracking-tight">LCC AI</h1>
                <p class="text-[10px] font-medium text-slate-500 uppercase tracking-wider">Professional Assistant</p>
            </div>
        </div>
        <button id="speakerButton" class="w-10 h-10 rounded-full hover:bg-slate-100 flex items-center justify-center transition-colors text-slate-500">
            <i class="fas fa-volume-up"></i>
        </button>
    </header>

    <!-- Chat Area -->
    <main id="chatbox" class="flex-grow overflow-y-auto p-4 space-y-6 chatbox scroll-smooth">
        <!-- Welcome Message -->
        <div class="flex justify-start w-full message-anim">
            <div class="flex gap-2 max-w-[85%] md:max-w-[70%]">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs mt-1">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="bg-white p-3.5 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 text-sm leading-relaxed">
                    Hello! I am your AI Assistant. 
                    <br><br>
                    • <b>Ask</b> me any question.<br>
                    • <b>Upload/Snap</b> a photo for me to read.<br>
                    • <b>Generate</b> images using the wand button.
                </div>
            </div>
        </div>
    </main>

    <!-- Typing Indicator (Hidden by default) -->
    <div id="typingIndicator" class="hidden px-6 pb-2">
        <div class="flex items-center gap-2 bg-white px-4 py-3 rounded-2xl rounded-bl-none shadow-sm border border-slate-100 w-fit">
            <div class="typing-dot w-2 h-2 rounded-full"></div>
            <div class="typing-dot w-2 h-2 rounded-full"></div>
            <div class="typing-dot w-2 h-2 rounded-full"></div>
        </div>
    </div>

    <!-- Input Area -->
    <footer class="glass-input p-3 pb-safe z-20">
        <form id="chatForm" class="w-full max-w-4xl mx-auto flex gap-2 items-center relative">
            
            <!-- Tools Menu -->
            <div class="flex items-center gap-1 bg-slate-100 rounded-full p-1 px-2 border border-slate-200">
                <button id="cameraButton" type="button" class="p-2.5 text-slate-500 hover:text-indigo-600 transition-colors rounded-full hover:bg-white" title="Open Camera">
                    <i class="fas fa-camera"></i>
                </button>
                <button id="galleryButton" type="button" class="p-2.5 text-slate-500 hover:text-indigo-600 transition-colors rounded-full hover:bg-white" title="Upload Image">
                    <i class="fas fa-image"></i>
                </button>
                <button id="genImageButton" type="button" class="p-2.5 text-slate-500 hover:text-indigo-600 transition-colors rounded-full hover:bg-white" title="Generate Image">
                    <i class="fas fa-wand-magic-sparkles"></i>
                </button>
            </div>

            <!-- Text Input -->
            <div class="flex-grow relative">
                <input id="chatInput" type="text" 
                    class="w-full bg-slate-100 border-0 rounded-full py-3.5 pl-4 pr-10 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all shadow-inner placeholder-slate-400" 
                    placeholder="Type or use wand to generate..." autocomplete="off">
                <button id="micButton" type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 p-1">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>

            <!-- Send Button -->
            <button id="sendButton" type="submit" class="w-12 h-12 bg-indigo-600 text-white rounded-full flex-shrink-0 shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:scale-105 transition-all flex items-center justify-center">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>

            <!-- Hidden Inputs -->
            <input type="file" id="imageUpload" accept="image/*" class="hidden">
        </form>
    </footer>

    <!-- Fullscreen Media Modal (Camera & Crop) -->
    <div id="mediaModal" class="hidden fixed inset-0 z-50 bg-slate-900 flex flex-col">
        <!-- Modal Header -->
        <div class="flex justify-between items-center p-4 bg-black/20 backdrop-blur-sm absolute top-0 w-full z-10 text-white">
            <h3 class="font-medium text-sm tracking-wide opacity-80" id="modalTitle">Camera</h3>
            <button id="closeModal" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Main Content Area -->
        <div class="flex-grow relative bg-black flex items-center justify-center overflow-hidden">
            <!-- Live Video -->
            <video id="videoFeed" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
            
            <!-- Image for Cropping -->
            <div id="cropContainer" class="w-full h-full hidden bg-black">
                <img id="imageToCrop" src="" alt="Crop Preview" class="max-w-full max-h-full block">
            </div>
        </div>

        <!-- Modal Footer / Controls -->
        <div class="bg-black/80 backdrop-blur-md p-6 pb-8 flex justify-center items-center gap-8 min-h-[120px]">
            
            <!-- Capture Button -->
            <button id="captureBtn" class="hidden group relative">
                <div class="w-16 h-16 rounded-full border-4 border-white flex items-center justify-center transition-transform group-hover:scale-95">
                    <div class="w-14 h-14 bg-white rounded-full"></div>
                </div>
            </button>

            <!-- Crop Controls -->
            <div id="cropControls" class="hidden flex gap-4 w-full justify-between max-w-sm">
                <button id="retakeBtn" class="flex-1 py-3 bg-slate-700 text-white rounded-xl font-medium hover:bg-slate-600 transition-colors">
                    Retake
                </button>
                <button id="confirmCropBtn" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-500 transition-colors shadow-lg shadow-indigo-900/50">
                    <i class="fas fa-check mr-2"></i> Use Photo
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration & Elements ---
        const elements = {
            chatForm: document.getElementById("chatForm"),
            chatInput: document.getElementById('chatInput'),
            chatbox: document.getElementById('chatbox'),
            sendButton: document.getElementById("sendButton"),
            cameraButton: document.getElementById("cameraButton"),
            galleryButton: document.getElementById("galleryButton"),
            genImageButton: document.getElementById("genImageButton"),
            imageUpload: document.getElementById("imageUpload"),
            micButton: document.getElementById("micButton"),
            speakerButton: document.getElementById("speakerButton"),
            typingIndicator: document.getElementById('typingIndicator'),
            mediaModal: document.getElementById('mediaModal'),
            videoFeed: document.getElementById('videoFeed'),
            cropContainer: document.getElementById('cropContainer'),
            imageToCrop: document.getElementById('imageToCrop'),
            captureBtn: document.getElementById('captureBtn'),
            cropControls: document.getElementById('cropControls'),
            confirmCropBtn: document.getElementById('confirmCropBtn'),
            retakeBtn: document.getElementById('retakeBtn'),
            closeModal: document.getElementById('closeModal'),
            modalTitle: document.getElementById('modalTitle')
        };

        let state = {
            isSpeakerOn: true,
            pendingImageFile: null,
            stream: null,
            cropper: null
        };

        const synth = window.speechSynthesis;

        // --- Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => elements.chatInput.focus());

        // Button Actions
        elements.cameraButton.addEventListener('click', openCameraMode);
        elements.galleryButton.addEventListener('click', () => elements.imageUpload.click());
        
        elements.genImageButton.addEventListener('click', () => {
            elements.chatInput.value = "/image ";
            elements.chatInput.focus();
        });

        elements.closeModal.addEventListener('click', closeMediaModal);
        elements.captureBtn.addEventListener('click', capturePhoto);
        elements.retakeBtn.addEventListener('click', openCameraMode);
        elements.confirmCropBtn.addEventListener('click', finishCropping);
        elements.speakerButton.addEventListener('click', toggleSpeaker);

        // File Upload Handler
        elements.imageUpload.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (evt) => openCropMode(evt.target.result);
                reader.readAsDataURL(e.target.files[0]);
            }
            e.target.value = '';
        });

        // Chat Submission
        elements.chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = elements.chatInput.value.trim();
            if (!message && !state.pendingImageFile) return;

            // UI: Add User Message
            if (message) {
                addMessageToChat(message, true);
            } else if (state.pendingImageFile) {
                addMessageToChat("Analyze this image.", true);
            }
            
            elements.chatInput.value = '';

            if (state.pendingImageFile) {
                // Image + Text Flow
                const imgFile = state.pendingImageFile;
                state.pendingImageFile = null; 
                elements.chatInput.placeholder = "Type or ask about an image...";
                await processImageQuery(imgFile, message || "Explain this image");
            } else {
                // Text Only Flow
                await processTextQuery(message);
            }
        });

        // --- Core Logic ---

        // 1. Camera & Cropping System
        async function openCameraMode() {
            if (state.cropper) state.cropper.destroy();
            state.cropper = null;

            elements.mediaModal.classList.remove('hidden');
            elements.modalTitle.textContent = "Take a Photo";
            
            elements.cropContainer.classList.add('hidden');
            elements.cropControls.classList.add('hidden');
            
            elements.videoFeed.classList.remove('hidden');
            elements.captureBtn.classList.remove('hidden');

            try {
                state.stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                elements.videoFeed.srcObject = state.stream;
            } catch (err) {
                alert("Camera access denied or unavailable.");
                closeMediaModal();
            }
        }

        function capturePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = elements.videoFeed.videoWidth;
            canvas.height = elements.videoFeed.videoHeight;
            canvas.getContext('2d').drawImage(elements.videoFeed, 0, 0);
            
            stopCamera();
            openCropMode(canvas.toDataURL('image/png'));
        }

        function openCropMode(imageSrc) {
            elements.mediaModal.classList.remove('hidden');
            elements.modalTitle.textContent = "Crop & Edit";
            
            elements.videoFeed.classList.add('hidden');
            elements.captureBtn.classList.add('hidden');
            
            elements.cropContainer.classList.remove('hidden');
            elements.cropControls.classList.remove('hidden');
            elements.cropControls.classList.add('flex');

            elements.imageToCrop.src = imageSrc;

            if (state.cropper) state.cropper.destroy();
            
            state.cropper = new Cropper(elements.imageToCrop, {
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 0.9,
                restore: false,
                guides: true,
                center: true,
                highlight: false,
                background: false,
                cropBoxMovable: true,
                cropBoxResizable: true,
            });
        }

        function finishCropping() {
            if (!state.cropper) return;
            
            state.cropper.getCroppedCanvas().toBlob((blob) => {
                const file = new File([blob], "captured.png", { type: "image/png" });
                state.pendingImageFile = file;
                
                closeMediaModal();
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'flex justify-end w-full message-anim mb-2';
                    div.innerHTML = `
                        <div class="relative group">
                            <img src="${e.target.result}" class="max-w-[150px] rounded-2xl border-2 border-indigo-500 shadow-md">
                            <div class="absolute -bottom-2 -right-2 bg-indigo-600 text-white rounded-full p-1 w-6 h-6 flex items-center justify-center text-xs">
                                <i class="fas fa-check"></i>
                            </div>
                        </div>`;
                    elements.chatbox.appendChild(div);
                    scrollToBottom();
                    
                    elements.chatInput.placeholder = "Ask a question about this image...";
                    elements.chatInput.focus();
                };
                reader.readAsDataURL(file);

            }, 'image/png');
        }

        function closeMediaModal() {
            stopCamera();
            if (state.cropper) state.cropper.destroy();
            elements.mediaModal.classList.add('hidden');
        }

        function stopCamera() {
            if (state.stream) {
                state.stream.getTracks().forEach(t => t.stop());
                state.stream = null;
            }
        }

        // 2. AI Processing
        async function processImageQuery(file, userQuestion) {
            setLoading(true);

            try {
                const { data: { text: ocrText } } = await Tesseract.recognize(file, 'eng');
                const cleanText = ocrText ? ocrText.trim() : "";
                
                let prompt = "";
                if (cleanText.length > 5) {
                    prompt = `I have uploaded an image containing this text: "${cleanText}". \n\nUser Question: "${userQuestion}"\n\nAnalyze the text and context to provide a helpful, educational answer.`;
                } else {
                    prompt = `I uploaded an image but it has no readable text. User Question: "${userQuestion}". Answer based on general knowledge or ask for clarification if the image was essential.`;
                }

                const response = await callLLM(prompt);
                addMessageToChat(response, false);
                speak(response);

            } catch (error) {
                console.error(error);
                addMessageToChat("I had trouble reading that image. Please try a clearer photo.", false);
            } finally {
                setLoading(false);
            }
        }

        async function processTextQuery(text) {
            const lowerText = text.toLowerCase().trim();

            // --- 🤖 IDENTITY / CREATOR CHECK LOGIC ---
            // This bypasses the AI and returns the hardcoded developer info
            const creatorTriggers = [
                // English
                'who are you', 'what is your name', 'your name', 'tell me your name',
                'who created you', 'who made you', 'who built you', 'who developed you', 'who coded you',
                'who is your creator', 'who is your developer', 'who is your owner', 'who is your father',
                'who is prashant', 'prashant kumar mandal', 'about your developer',
                // Hinglish / Hindi
                'tumhara naam', 'tera naam', 'aapka naam', 'tum kaun ho', 'aap kaun hai',
                'kisne banaya', 'kaun banaya', 'kisne develop kiya', 'tumhara baap', 'tumhara pita',
                'developer kaun', 'kaun hai prashant', 'kaha ka hai', 'kahan ka hai'
            ];

            // Check if any trigger phrase is inside the user's message
            if (creatorTriggers.some(trigger => lowerText.includes(trigger))) {
                setLoading(true);
                // Simulate thinking delay for realism
                setTimeout(() => {
                    const staticResponse = "My name LCC AI Developed with love by Prashant Kumar Mandal , he is a software app web developer and ui/ux frontend designer from small village Hajipur in Darbhanga Bihar India .";
                    setLoading(false);
                    addMessageToChat(staticResponse, false);
                    speak(staticResponse);
                }, 600);
                return; // Stop execution here, do not call API
            }
            // -----------------------------------------

            setLoading(true);
            try {
                // Check for image generation command
                if (lowerText.startsWith('/image')) {
                    const imgPrompt = text.replace('/image', '').trim();
                    const data = await callApi('https://backend.buildpicoapps.com/aero/run/image-generation-api?pk=v1-Z0FBQUFBQnBoUUhqOWZGcnEzZ2JMRW5Qcks0eDlGUjJzcGhNY3VLTXNfM0FnblpGYmotbW9QVmlZNk1NSlN5VU15V1d3YmN4ZWhCalcyZjA4bkIyT2VfVlduaGNYazNaOXc9PQ==', imgPrompt);
                    
                    if (data.status === 'success') {
                        addImageResponse(data.imageUrl);
                    } else {
                        addMessageToChat("Sorry, I couldn't generate that image.", false);
                    }
                } else {
                    // Regular Chat
                    const response = await callLLM(text);
                    addMessageToChat(response, false);
                    speak(response);
                }
            } catch (err) {
                addMessageToChat("I'm having trouble connecting right now.", false);
            } finally {
                setLoading(false);
            }
        }

        // 3. API Utilities
        async function callLLM(prompt) {
            const data = await callApi('https://backend.buildpicoapps.com/aero/run/llm-api?pk=v1-Z0FBQUFBQnBoUUhqOWZGcnEzZ2JMRW5Qcks0eDlGUjJzcGhNY3VLTXNfM0FnblpGYmotbW9QVmlZNk1NSlN5VU15V1d3YmN4ZWhCalcyZjA4bkIyT2VfVlduaGNYazNaOXc9PQ==', prompt);
            return data.text || "I didn't get a response.";
        }

        async function callApi(url, prompt) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            return await res.json();
        }

        // 4. UI Utilities
        function addMessageToChat(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full message-anim`;
            
            const content = isUser 
                ? `<div class="bg-indigo-600 text-white px-4 py-3 rounded-2xl rounded-tr-none shadow-md max-w-[85%] text-sm leading-relaxed">${escapeHtml(text)}</div>`
                : `<div class="flex gap-2 max-w-[90%]">
                     <div class="w-8 h-8 rounded-full bg-indigo-100 flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs mt-1"><i class="fas fa-robot"></i></div>
                     <div class="bg-white px-4 py-3 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 text-slate-700 text-sm leading-relaxed">${formatText(text)}</div>
                   </div>`;
            
            wrapper.innerHTML = content;
            elements.chatbox.appendChild(wrapper);
            scrollToBottom();
        }

        function addImageResponse(url) {
            const div = document.createElement('div');
            div.className = "flex justify-start w-full message-anim";
            div.innerHTML = `
                <div class="flex gap-2 max-w-[90%]">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs mt-1"><i class="fas fa-robot"></i></div>
                    <div class="mt-1">
                        <img src="${url}" class="rounded-xl shadow-lg max-w-[250px] border border-slate-200 cursor-pointer hover:opacity-95 transition-opacity" onclick="window.open('${url}', '_blank')">
                        <p class="text-xs text-slate-400 mt-1 ml-1">Generated Image</p>
                    </div>
                </div>`;
            elements.chatbox.appendChild(div);
            scrollToBottom();
        }

        function setLoading(isLoading) {
            elements.typingIndicator.classList.toggle('hidden', !isLoading);
            elements.sendButton.disabled = isLoading;
            elements.sendButton.classList.toggle('opacity-50', isLoading);
            if (isLoading) scrollToBottom();
        }

        function scrollToBottom() {
            elements.chatbox.scrollTop = elements.chatbox.scrollHeight;
        }

        function toggleSpeaker() {
            state.isSpeakerOn = !state.isSpeakerOn;
            const icon = elements.speakerButton.querySelector('i');
            icon.className = state.isSpeakerOn ? 'fas fa-volume-up' : 'fas fa-volume-mute';
            if(!state.isSpeakerOn) synth.cancel();
        }

        function speak(text) {
            if (!state.isSpeakerOn) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.rate = 1.1; 
            synth.speak(u);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatText(text) {
            let formatted = escapeHtml(text);
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            return formatted;
        }

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';
            
            recognition.onstart = () => elements.micButton.classList.add('text-red-500', 'animate-pulse');
            recognition.onend = () => elements.micButton.classList.remove('text-red-500', 'animate-pulse');
            
            recognition.onresult = (e) => {
                elements.chatInput.value = e.results[0][0].transcript;
                elements.chatInput.focus();
            };
            
            elements.micButton.addEventListener('click', () => recognition.start());
        } else {
            elements.micButton.style.display = 'none';
        }

    </script>
</body>
</html>
