<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AnimeX Pro - Stream Anime Free</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: {
          primary: '#8b5cf6',
          secondary: '#6366f1',
          dark: '#050508',
          surface: '#0f0f1a',
          card: '#14142a',
          border: 'rgba(139,92,246,0.3)'
        },
        animation: {
          shimmer: 'shimmer 1.5s infinite',
          fadeIn: 'fadeIn 0.3s ease',
          slideUp: 'slideUp 0.3s ease'
        },
        keyframes: {
          shimmer: {
            '0%': { backgroundPosition: '-200% 0' },
            '100%': { backgroundPosition: '200% 0' }
          },
          fadeIn: {
            '0%': { opacity: '0' },
            '100%': { opacity: '1' }
          },
          slideUp: {
            '0%': { opacity: '0', transform: 'translateY(15px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' }
          }
        }
      }
    }
  }
</script>
<style>
  :root {
    --bg-dark: #050508;
    --glass-bg: rgba(20,20,35,0.85);
    --glass-border: rgba(139,92,246,0.25);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg-dark);
    color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
  }
  
  /* Sticky Header */
  .app-header {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(5,5,8,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
  }
  
  /* Glass Cards */
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    transition: all 0.25s ease;
  }
  .glass-card:hover {
    border-color: rgba(139,92,246,0.6);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 20px rgba(139,92,246,0.15);
  }
  
  /* Neon Text */
  .neon-text {
    text-shadow: 0 0 12px rgba(139,92,246,0.7), 0 0 24px rgba(139,92,246,0.3);
  }
  
  /* Hero Slider */
  .hero-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.9s ease;
    background-size: cover;
    background-position: center top;
  }
  .hero-slide.active { opacity: 1; }
  .hero-overlay {
    background: linear-gradient(90deg, rgba(5,5,8,0.98) 0%, rgba(5,5,8,0.7) 45%, transparent 100%),
                linear-gradient(0deg, rgba(5,5,8,0.95) 0%, transparent 50%);
  }
  
  /* Scroll Rows */
  .scroll-row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding: 6px 4px 10px;
    scroll-snap-type: x mandatory;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .scroll-row::-webkit-scrollbar { display: none; }
  .anime-card {
    scroll-snap-align: start;
    min-width: 140px;
    max-width: 140px;
    cursor: pointer;
  }
  @media(min-width: 640px) { .anime-card { min-width: 160px; max-width: 160px; } }
  @media(min-width: 1024px) { .anime-card { min-width: 180px; max-width: 180px; } }
  
  /* View Transitions */
  .view { display: none; min-height: calc(100vh - 140px); }
  .view.active { display: block; animation: fadeIn 0.25s ease; }
  
  /* Mobile Bottom Nav */
  .mobile-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--glass-border);
    z-index: 90;
    display: flex;
    justify-content: space-around;
    padding: 6px 0 10px;
  }
  @media(min-width: 768px) { .mobile-nav { display: none; } }
  
  /* Player Iframe */
  .player-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .player-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
  
  /* Skeleton */
  .skel {
    background: linear-gradient(90deg, #14142a 25%, #1a1a35 50%, #14142a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 10px;
  }
  
  /* Server Buttons */
  .srv-btn {
    transition: all 0.15s ease;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid transparent;
  }
  .srv-btn:hover { background: rgba(139,92,246,0.15); }
  .srv-btn.on {
    border-color: #8b5cf6;
    background: rgba(139,92,246,0.2);
    box-shadow: 0 0 12px rgba(139,92,246,0.3);
  }
  
  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(30px);
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none;
    transition: all 0.3s ease;
    z-index: 300;
    max-width: 90%;
    text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
  /* Search Overlay */
  #searchOverlay {
    position: fixed; inset: 0;
    background: rgba(5,5,8,0.97);
    backdrop-filter: blur(20px);
    z-index: 150;
    display: none;
    flex-direction: column;
    padding: 16px;
    padding-top: 70px;
  }
  #searchOverlay.open { display: flex; animation: fadeIn 0.2s ease; }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.5); border-radius: 4px; }
  
  /* Episode Grid */
  .ep-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.15s ease;
  }
  .ep-btn:hover { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.4); }
  .ep-btn.on { background: rgba(139,92,246,0.25); border-color: #8b5cf6; box-shadow: 0 0 10px rgba(139,92,246,0.3); }
  
  /* Utility */
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header class="app-header">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5 cursor-pointer" onclick="goHome()">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center font-bold text-sm neon-text">A</div>
      <span class="text-xl font-extrabold neon-text tracking-tight">Anime<span class="text-primary">X</span> Pro</span>
    </div>
    
    <nav class="hidden md:flex items-center gap-1.5">
      <button onclick="goHome()" class="px-4 py-2 rounded-xl hover:bg-white/10 transition font-medium text-sm">Home</button>
      <button onclick="openSection('trending')" class="px-4 py-2 rounded-xl hover:bg-white/10 transition font-medium text-sm">Trending</button>
      <button onclick="openSection('popular')" class="px-4 py-2 rounded-xl hover:bg-white/10 transition font-medium text-sm">Popular</button>
      <button onclick="openSection('toprated')" class="px-4 py-2 rounded-xl hover:bg-white/10 transition font-medium text-sm">Top Rated</button>
      <button onclick="openSection('airing')" class="px-4 py-2 rounded-xl hover:bg-white/10 transition font-medium text-sm">Airing</button>
    </nav>
    
    <div class="flex items-center gap-2.5">
      <button onclick="toggleSearch()" class="p-2.5 rounded-xl hover:bg-white/10 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </button>
      <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="md:hidden p-2.5 rounded-xl hover:bg-white/10 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
  
  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden md:hidden px-4 pb-4">
    <div class="glass-card p-3 flex flex-col gap-1">
      <button onclick="goHome(); document.getElementById('mobileMenu').classList.add('hidden')" class="text-left px-4 py-3 rounded-xl hover:bg-white/10 transition">🏠 Home</button>
      <button onclick="openSection('trending'); document.getElementById('mobileMenu').classList.add('hidden')" class="text-left px-4 py-3 rounded-xl hover:bg-white/10 transition">🔥 Trending</button>
      <button onclick="openSection('popular'); document.getElementById('mobileMenu').classList.add('hidden')" class="text-left px-4 py-3 rounded-xl hover:bg-white/10 transition">⭐ Popular</button>
      <button onclick="openSection('toprated'); document.getElementById('mobileMenu').classList.add('hidden')" class="text-left px-4 py-3 rounded-xl hover:bg-white/10 transition">🏆 Top Rated</button>
      <button onclick="openSection('airing'); document.getElementById('mobileMenu').classList.add('hidden')" class="text-left px-4 py-3 rounded-xl hover:bg-white/10 transition">📺 Airing</button>
    </div>
  </div>
</header>

<!-- ==================== SEARCH OVERLAY ==================== -->
<div id="searchOverlay">
  <div class="flex gap-3 mb-6">
    <div class="relative flex-1">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="searchInput" placeholder="Search anime..." 
             class="w-full glass-card pl-11 pr-4 py-3.5 bg-white/5 focus:outline-none focus:border-primary/60 focus:ring-2 focus:ring-primary/20 text-base">
    </div>
    <button onclick="toggleSearch()" class="p-3.5 rounded-xl bg-white/10 hover:bg-white/20 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="searchResults" class="flex-1 overflow-y-auto pb-4 space-y-3">
    <div class="text-center text-gray-500 pt-12">Type to search anime...</div>
  </div>
</div>

<!-- ==================== HOME VIEW ==================== -->
<section id="homeView" class="view active pb-20">
  <div class="max-w-7xl mx-auto px-4">
    
    <!-- Hero -->
    <div class="relative h-[55vh] md:h-[65vh] rounded-2xl overflow-hidden mb-8 glass-card">
      <div class="hero-slide active" id="heroSlide1"></div>
      <div class="hero-slide" id="heroSlide2"></div>
      <div class="hero-slide" id="heroSlide3"></div>
      <div class="absolute inset-0 hero-overlay"></div>
      <div class="absolute bottom-0 left-0 right-0 p-5 md:p-8">
        <div id="heroContent" class="max-w-xl">
          <div class="flex flex-wrap gap-2 mb-3">
            <span class="px-3 py-1 rounded-full bg-primary/20 text-primary text-xs font-semibold border border-primary/30">⭐ <span id="heroRating">-</span></span>
            <span class="px-3 py-1 rounded-full bg-white/10 text-white text-xs font-semibold border border-white/10" id="heroYear">-</span>
            <span class="px-3 py-1 rounded-full bg-white/10 text-white text-xs font-semibold border border-white/10" id="heroEps">-</span>
          </div>
          <h1 id="heroTitle" class="text-2xl md:text-4xl font-extrabold mb-2 neon-text leading-tight">Loading Anime...</h1>
          <p id="heroDesc" class="text-gray-300 text-sm md:text-base mb-4 line-clamp-3">Fetching content...</p>
          <div class="flex flex-wrap gap-3">
            <button id="heroWatchBtn" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-primary to-secondary font-semibold text-sm hover:shadow-lg hover:shadow-primary/40 transition flex items-center gap-2">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
              Watch Now
            </button>
            <button id="heroListBtn" class="px-5 py-2.5 rounded-xl bg-white/10 border border-white/20 font-semibold text-sm hover:bg-white/20 transition flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
              Add to List
            </button>
          </div>
        </div>
      </div>
      <div class="absolute bottom-4 right-4 flex gap-1.5">
        <button onclick="slideTo(0)" class="w-2.5 h-2.5 rounded-full bg-white/40 hover:bg-primary transition dot"></button>
        <button onclick="slideTo(1)" class="w-2.5 h-2.5 rounded-full bg-white/40 hover:bg-primary transition dot"></button>
        <button onclick="slideTo(2)" class="w-2.5 h-2.5 rounded-full bg-white/40 hover:bg-primary transition dot"></button>
      </div>
    </div>
    
    <!-- Rows -->
    <div id="row-trending" class="mb-10"><SectionHeader title="🔥 Trending Now" id="trending" /></div>
    <div id="row-popular" class="mb-10"><SectionHeader title="⭐ Popular Anime" id="popular" /></div>
    <div id="row-toprated" class="mb-10"><SectionHeader title="🏆 Top Rated" id="toprated" /></div>
    <div id="row-airing" class="mb-10"><SectionHeader title="📺 Airing Today" id="airing" /></div>
    <div id="row-upcoming" class="mb-10"><SectionHeader title="🗓️ Upcoming" id="upcoming" /></div>
    
    <!-- Genres -->
    <div class="mb-10">
      <h2 class="text-lg font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-white to-primary/80">🎭 Browse by Genre</h2>
      <div class="flex flex-wrap gap-2">
        <button onclick="loadGenre(16,'Animation')" class="px-4 py-2 rounded-full bg-primary/15 border border-primary/30 text-sm hover:bg-primary/30 transition">Animation</button>
        <button onclick="loadGenre(10759,'Action & Adventure')" class="px-4 py-2 rounded-full bg-primary/15 border border-primary/30 text-sm hover:bg-primary/30 transition">Action & Adventure</button>
        <button onclick="loadGenre(35,'Comedy')" class="px-4 py-2 rounded-full bg-primary/15 border border-primary/30 text-sm hover:bg-primary/30 transition">Comedy</button>
        <button onclick="loadGenre(18,'Drama')" class="px-4 py-2 rounded-full bg-primary/15 border border-primary/30 text-sm hover:bg-primary/30 transition">Drama</button>
        <button onclick="loadGenre(14,'Fantasy')" class="px-4 py-2 rounded-full bg-primary/15 border border-primary/30 text-sm hover:bg-primary/30 transition">Fantasy</button>
        <button onclick="loadGenre(9648,'Mystery')" class="px-4 py-2 rounded-full bg-primary/15 border border-primary/30 text-sm hover:bg-primary/30 transition">Mystery</button>
        <button onclick="loadGenre(10765,'Sci-Fi')" class="px-4 py-2 rounded-full bg-primary/15 border border-primary/30 text-sm hover:bg-primary/30 transition">Sci-Fi</button>
      </div>
    </div>
    
  </div>
</section>

<!-- ==================== DETAILS VIEW ==================== -->
<section id="detailsView" class="view pb-20">
  <div class="max-w-5xl mx-auto px-4">
    <button onclick="goHome()" class="mb-6 flex items-center gap-2 text-gray-400 hover:text-white transition group">
      <svg class="w-5 h-5 group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back
    </button>
    <div id="detailsContent" class="glass-card p-6">
      <div class="animate-pulse"><div class="flex flex-col md:flex-row gap-6"><div class="skel w-full md:w-64 h-80"></div><div class="flex-1"><div class="skel h-8 w-3/4 mb-3"></div><div class="skel h-4 w-1/2 mb-4"></div><div class="skel h-3 w-full mb-2"></div><div class="skel h-3 w-11/12 mb-2"></div><div class="skel h-3 w-4/5 mb-6"></div><div class="flex gap-3"><div class="skel w-28 h-10"></div><div class="skel w-36 h-10"></div></div></div></div></div>
    </div>
  </div>
</section>

<!-- ==================== PLAYER VIEW ==================== -->
<section id="playerView" class="view pb-20">
  <div class="max-w-6xl mx-auto px-4">
    <button onclick="showDetails(currentItem)" class="mb-4 flex items-center gap-2 text-gray-400 hover:text-white transition group">
      <svg class="w-5 h-5 group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Details
    </button>
    
    <div class="glass-card p-3 mb-6">
      <div class="player-wrap">
        <iframe id="playerFrame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>
    
    <div class="glass-card p-5 mb-6">
      <h3 class="font-semibold mb-3 text-sm text-gray-300">Streaming Server</h3>
      <div class="flex flex-wrap gap-2">
        <button class="srv-btn px-4 py-2.5 rounded-xl text-sm font-medium on" onclick="switchServer(1)">🎬 Server 1 (HD)</button>
        <button class="srv-btn px-4 py-2.5 rounded-xl text-sm font-medium" onclick="switchServer(2)">⚡ Server 2 (Fast)</button>
        <button class="srv-btn px-4 py-2.5 rounded-xl text-sm font-medium" onclick="switchServer(3)">🔗 Server 3 (Backup)</button>
        <button class="srv-btn px-4 py-2.5 rounded-xl text-sm font-medium" onclick="switchServer(4)">🛡️ Server 4 (Secure)</button>
      </div>
    </div>
    
    <div id="epSelector" class="glass-card p-5 mb-6 hidden">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-sm text-gray-300">Season <span id="curSeason">1</span></h3>
        <div class="flex gap-2">
          <button onclick="changeSeason(-1)" class="px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 text-xs">← Prev</button>
          <button onclick="changeSeason(1)" class="px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 text-xs">Next →</button>
        </div>
      </div>
      <div id="epButtons" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-2"></div>
    </div>
    
    <div class="glass-card p-5">
      <h2 id="playTitle" class="text-xl font-bold mb-2">Loading...</h2>
      <div class="flex flex-wrap gap-2 text-sm text-gray-400 mb-3">
        <span class="flex items-center gap-1">⭐ <span id="playRating">-</span></span>
        <span>•</span>
        <span id="playDate">-</span>
        <span>•</span>
        <span id="playSeason">S1 E1</span>
      </div>
      <p id="playDesc" class="text-gray-300 text-sm leading-relaxed">-</p>
    </div>
  </div>
</section>

<!-- ==================== FULL GRID VIEW ==================== -->
<section id="gridView" class="view pb-20">
  <div class="max-w-7xl mx-auto px-4">
    <button onclick="goHome()" class="mb-6 flex items-center gap-2 text-gray-400 hover:text-white transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back Home
    </button>
    <h2 id="gridTitle" class="text-xl font-bold mb-6 neon-text">Loading...</h2>
    <div id="gridContent" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
    <div id="gridLoadMore" class="text-center py-6 hidden">
      <button onclick="loadGridMore()" class="px-6 py-2.5 rounded-xl bg-white/10 hover:bg-white/20 transition text-sm font-medium">Load More</button>
    </div>
  </div>
</section>

<!-- ==================== MOBILE NAV ==================== -->
<nav class="mobile-nav">
  <button onclick="goHome()" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-white/10 transition">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    <span class="text-[10px] font-medium">Home</span>
  </button>
  <button onclick="toggleSearch()" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-white/10 transition">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <span class="text-[10px] font-medium">Search</span>
  </button>
  <button onclick="openSection('trending')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-white/10 transition">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
    <span class="text-[10px] font-medium">Trending</span>
  </button>
  <button onclick="goHome(); toast('Watchlist: ' + (getLS('wl')||[]).length + ' items')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-white/10 transition">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    <span class="text-[10px] font-medium">Profile</span>
  </button>
</nav>

<!-- ==================== TOAST ==================== -->
<div id="toast"></div>

<!-- ==================== JAVASCRIPT ==================== -->
<script>
// ===== CONFIG =====
const API_KEY = 'b72a0e80058553968e369cae73736579'; // ← Replace with your TMDB API key
const BASE = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';
const IMG_ORIG = 'https://image.tmdb.org/t/p/original';
const NO_IMG = 'https://via.placeholder.com/300x450/14142a/8b5cf6?text=No+Image';

// ===== STATE =====
let currentItem = null;
let curSeason = 1;
let curEpisode = 1;
let curServer = 1;
let heroData = [];
let heroIdx = 0;
let gridPage = 1;
let gridFetch = null;
let searchTimer = null;

// ===== HELPERS =====
const $ = id => document.getElementById(id);
const toast = msg => {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

const getLS = k => { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch { return []; } };
const setLS = (k, v) => localStorage.setItem(k, JSON.stringify(v));

const api = async (endpoint, params = {}) => {
  const url = new URL(`${BASE}${endpoint}`);
  url.searchParams.append('api_key', API_KEY);
  url.searchParams.append('language', 'en-US');
  Object.entries(params).forEach(([k,v]) => url.searchParams.append(k,v));
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
};

// Filter: Animation (16) OR Japanese shows
const isAnime = item => {
  return item.genre_ids?.includes(16) || 
         item.original_language === 'ja' ||
         (item.name && (item.name.toLowerCase().includes('anime') || item.name.includes('な') || item.name.includes('の')));
};

// ===== CARD HTML =====
const cardHTML = item => {
  const p = item.poster_path ? `${IMG}${item.poster_path}` : NO_IMG;
  const r = (item.vote_average || 0).toFixed(1);
  const y = item.first_air_date ? item.first_air_date.split('-')[0] : (item.release_date ? item.release_date.split('-')[0] : '');
  const n = item.name || item.title || 'Unknown';
  const ep = item.number_of_episodes ? `<span class="text-[10px] text-gray-500">${item.number_of_episodes} EP</span>` : '';
  
  return `
    <div class="anime-card glass-card p-3 group" onclick="openDetails(${item.id})">
      <div class="relative overflow-hidden rounded-xl mb-2 bg-black/30">
        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" 
             data-src="${p}" alt="${n}" loading="lazy"
             class="w-full h-[210px] md:h-[260px] object-cover rounded-xl transition-transform duration-300 group-hover:scale-105 card-img">
        <div class="absolute top-2 right-2 px-1.5 py-0.5 rounded bg-black/60 text-[10px] font-bold flex items-center gap-0.5 backdrop-blur-sm">
          <svg class="w-3 h-3 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
          ${r}
        </div>
      </div>
      <h3 class="font-semibold text-xs line-clamp-2 group-hover:text-primary transition min-h-[32px]">${n}</h3>
      <div class="flex items-center justify-between mt-1.5">
        <span class="text-[10px] text-gray-400">${y}</span>
        ${ep}
      </div>
    </div>
  `;
};

const skeletonRow = () => Array(8).fill(`<div class="anime-card glass-card p-3"><div class="skel h-[210px] md:h-[260px] mb-2"></div><div class="skel h-3 w-3/4 mb-1"></div><div class="skel h-2 w-1/3"></div></div>`).join('');

// ===== NAVIGATION =====
const hideAll = () => document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

const goHome = () => { hideAll(); $('homeView').classList.add('active'); window.scrollTo({top:0, behavior:'smooth'}); };
const goDetails = () => { hideAll(); $('detailsView').classList.add('active'); window.scrollTo({top:0, behavior:'smooth'}); };
const goPlayer = () => { hideAll(); $('playerView').classList.add('active'); window.scrollTo({top:0, behavior:'smooth'}); };
const goGrid = () => { hideAll(); $('gridView').classList.add('active'); window.scrollTo({top:0, behavior:'smooth'}); };

// ===== LOAD ROW =====
const loadRow = async (containerId, fetchFn, title, filter = true) => {
  const el = $(containerId);
  if (!el) return;
  el.innerHTML = `<div class="flex items-center justify-between mb-4 px-1"><h2 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-primary/80">${title}</h2><button onclick="openSection('${containerId.replace('row-','')}')" class="text-primary text-xs hover:underline">View All →</button></div><div class="scroll-row">${skeletonRow()}</div>`;
  
  try {
    const data = await fetchFn();
    let items = filter ? data.results.filter(isAnime) : data.results;
    items = items.slice(0, 20);
    
    const row = el.querySelector('.scroll-row');
    if (items.length === 0) {
      row.innerHTML = '<div class="text-gray-500 text-sm px-4 py-4">No content available</div>';
      return;
    }
    
    row.innerHTML = items.map(cardHTML).join('');
    loadImages(el);
  } catch (e) {
    el.querySelector('.scroll-row').innerHTML = `<div class="text-red-400/80 text-sm px-4 py-4">⚠️ Failed to load. ${API_KEY === 'YOUR_TMDB_API_KEY' ? 'Add your TMDB API key!' : 'Check connection.'}</div>`;
  }
};

// ===== SECTION HEADER HELPER =====
const SectionHeader = (title, id) => `
  <div class="flex items-center justify-between mb-4 px-1">
    <h2 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-primary/80">${title}</h2>
    <button onclick="openSection('${id}')" class="text-primary text-xs hover:underline font-medium">View All →</button>
  </div>
  <div class="scroll-row" id="${id}-row">${skeletonRow()}</div>
`;

// ===== HERO =====
const initHero = async () => {
  try {
    const data = await api('/trending/tv/day');
    heroData = data.results.filter(isAnime).slice(0, 3);
    
    heroData.forEach((item, i) => {
      const slide = $(`heroSlide${i+1}`);
      if (slide && item.backdrop_path) {
        slide.style.backgroundImage = `url(${IMG_ORIG}${item.backdrop_path})`;
      }
    });
    
    if (heroData[0]) updateHero(heroData[0]);
    
    setInterval(() => {
      heroIdx = (heroIdx + 1) % 3;
      slideTo(heroIdx);
      if (heroData[heroIdx]) updateHero(heroData[heroIdx]);
    }, 6000);
  } catch (e) {
    $('heroTitle').textContent = '⚠️ API Key Required';
    $('heroDesc').textContent = 'Replace YOUR_TMDB_API_KEY with your actual TMDB API key.';
  }
};

const updateHero = item => {
  $('heroTitle').textContent = item.name;
  $('heroRating').textContent = (item.vote_average || 0).toFixed(1);
  $('heroYear').textContent = item.first_air_date ? item.first_air_date.split('-')[0] : 'N/A';
  $('heroEps').textContent = item.number_of_episodes ? `${item.number_of_episodes} EP` : 'TV';
  $('heroDesc').textContent = item.overview || 'No description.';
  $('heroWatchBtn').onclick = () => playAnime(item);
  
  const inList = getLS('wl').some(a => a.id === item.id);
  $('heroListBtn').innerHTML = inList 
    ? '<svg class="w-4 h-4 text-primary" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg> In List'
    : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg> Add to List';
  $('heroListBtn').onclick = () => toggleWatchlist(item, $('heroListBtn'));
};

let heroTimer;
const slideTo = idx => {
  heroIdx = idx;
  document.querySelectorAll('.hero-slide').forEach((s, i) => s.classList.toggle('active', i === idx));
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('bg-primary', i === idx);
    d.classList.toggle('bg-white/40', i !== idx);
  });
};

// ===== LOAD ALL SECTIONS =====
const loadHome = async () => {
  await initHero();
  loadRow('row-trending', () => api('/trending/tv/day'), '🔥 Trending Now');
  loadRow('row-popular', () => api('/tv/popular'), '⭐ Popular Anime');
  loadRow('row-toprated', () => api('/tv/top_rated'), '🏆 Top Rated');
  loadRow('row-airing', () => api('/tv/on_the_air'), '📺 Airing Today');
  loadRow('row-upcoming', () => api('/tv/airing_today'), '🗓️ Upcoming', false);
};

// ===== GRID VIEW =====
const openSection = async section => {
  const titles = { trending: '🔥 Trending', popular: '⭐ Popular', toprated: '🏆 Top Rated', airing: '📺 Airing' };
  const fns = { 
    trending: () => api('/trending/tv/day'),
    popular: () => api('/tv/popular'),
    toprated: () => api('/tv/top_rated'),
    airing: () => api('/tv/on_the_air')
  };
  
  $('gridTitle').textContent = titles[section] || 'Anime';
  gridPage = 1;
  gridFetch = () => fns[section](gridPage);
  goGrid();
  await loadGridMore();
};

const loadGenre = async (genreId, name) => {
  $('gridTitle').textContent = `🎭 ${name}`;
  gridPage = 1;
  gridFetch = () => api('/discover/tv', { with_genres: genreId, page: gridPage, sort_by: 'popularity.desc' });
  goGrid();
  await loadGridMore();
};

const loadGridMore = async () => {
  if (!gridFetch) return;
  const grid = $('gridContent');
  const loader = $('gridLoadMore');
  
  if (gridPage === 1) grid.innerHTML = Array(12).fill('<div class="glass-card p-3"><div class="skel h-[210px] mb-2"></div><div class="skel h-3 w-3/4"></div></div>').join('');
  
  try {
    const data = await gridFetch();
    let items = data.results.filter(isAnime);
    
    if (gridPage === 1 && items.length === 0) {
      grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">No content found</div>';
      return;
    }
    
    if (gridPage === 1) grid.innerHTML = '';
    grid.innerHTML += items.map(cardHTML).join('');
    loadImages(grid);
    
    gridPage++;
    loader.classList.toggle('hidden', gridPage > data.total_pages || items.length === 0);
  } catch (e) {
    if (gridPage === 1) grid.innerHTML = '<div class="col-span-full text-center text-red-400 py-10">Failed to load</div>';
  }
};

// ===== DETAILS =====
const openDetails = async id => {
  currentItem = { id };
  goDetails();
  
  const el = $('detailsContent');
  el.innerHTML = `<div class="animate-pulse"><div class="flex flex-col md:flex-row gap-6"><div class="skel w-full md:w-64 h-80"></div><div class="flex-1"><div class="skel h-8 w-3/4 mb-3"></div><div class="skel h-4 w-1/2 mb-4"></div><div class="skel h-3 w-full mb-2"></div><div class="skel h-3 w-11/12 mb-2"></div><div class="skel h-3 w-4/5 mb-6"></div><div class="flex gap-3"><div class="skel w-28 h-10"></div><div class="skel w-36 h-10"></div></div></div></div></div>`;
  
  try {
    const d = await api(`/tv/${id}`);
    currentItem = d;
    const p = d.poster_path ? `${IMG}${d.poster_path}` : NO_IMG;
    const genres = (d.genres || []).slice(0,3).map(g => `<span class="px-3 py-1 rounded-full bg-primary/15 border border-primary/30 text-xs">${g.name}</span>`).join('');
    const inList = getLS('wl').some(a => a.id === d.id);
    
    el.innerHTML = `
      <div class="flex flex-col md:flex-row gap-6">
        <div class="w-full md:w-64 flex-shrink-0">
          <img src="${p}" class="w-full rounded-2xl shadow-2xl card-img" onerror="this.src='${NO_IMG}'">
        </div>
        <div class="flex-1">
          <h1 class="text-2xl md:text-3xl font-extrabold mb-2 neon-text">${d.name}</h1>
          <div class="flex flex-wrap items-center gap-2 text-sm text-gray-300 mb-3">
            <span class="px-2 py-0.5 rounded bg-primary/20 text-primary font-semibold text-xs">⭐ ${(d.vote_average||0).toFixed(1)}</span>
            <span>${d.first_air_date ? d.first_air_date.split('-')[0] : ''}</span>
            <span>•</span>
            <span>${d.number_of_seasons} Season${d.number_of_seasons>1?'s':''}</span>
            <span>•</span>
            <span class="text-primary">${d.status}</span>
          </div>
          <div class="flex flex-wrap gap-2 mb-4">${genres}</div>
          <p class="text-gray-300 text-sm leading-relaxed mb-5">${d.overview || 'No description.'}</p>
          
          <div class="flex flex-wrap gap-3 mb-5">
            <button onclick="playAnime(currentItem)" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-primary to-secondary font-semibold text-sm hover:shadow-lg hover:shadow-primary/40 transition flex items-center gap-2">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
              Watch Now
            </button>
            <button onclick="toggleWatchlist(currentItem, this)" id="detailListBtn" class="px-5 py-2.5 rounded-xl bg-white/10 border border-white/20 font-semibold text-sm hover:bg-white/20 transition flex items-center gap-2">
              ${inList ? '<svg class="w-4 h-4 text-primary" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg> In List' : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg> Add to List'}
            </button>
          </div>
          
          ${d.number_of_seasons > 0 ? `
          <div class="glass-card p-4 mt-4">
            <h3 class="font-semibold mb-3 text-sm">Episodes</h3>
            <div class="flex flex-wrap gap-2 mb-4" id="seasonBtns">
              ${Array.from({length: Math.min(d.number_of_seasons, 15)}, (_, i) => `<button onclick="loadEps(${i+1})" class="px-4 py-2 rounded-xl bg-white/10 hover:bg-primary/20 border border-white/10 hover:border-primary/50 text-xs font-medium ${i===0?'bg-primary/20 border-primary/50':''}">S${i+1}</button>`).join('')}
            </div>
            <div id="epList" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-2"></div>
          </div>` : ''}
        </div>
      </div>
    `;
    
    if (d.number_of_seasons > 0) loadEps(1);
    
    // Save to recent
    let recent = getLS('recent').filter(a => a.id !== d.id);
    recent.unshift({ id: d.id, name: d.name, poster_path: d.poster_path });
    setLS('recent', recent.slice(0,25));
    
  } catch (e) {
    el.innerHTML = '<div class="text-center text-red-400 py-10">⚠️ Failed to load details. Check API key.</div>';
  }
};

const showDetails = item => {
  currentItem = item;
  openDetails(item.id);
};

// ===== EPISODES =====
const loadEps = async season => {
  if (!currentItem) return;
  curSeason = season;
  
  document.querySelectorAll('#seasonBtns button').forEach(btn => {
    const s = parseInt(btn.textContent.replace('S',''));
    btn.classList.toggle('bg-primary/20', s === season);
    btn.classList.toggle('border-primary/50', s === season);
    btn.classList.toggle('bg-white/10', s !== season);
    btn.classList.toggle('border-white/10', s !== season);
  });
  
  const el = $('epList');
  if (!el) return;
  el.innerHTML = '<div class="col-span-full text-center py-3 text-gray-500 text-xs">Loading...</div>';
  
  try {
    const data = await api(`/tv/${currentItem.id}/season/${season}`);
    const eps = data.episodes || [];
    if (eps.length === 0) { el.innerHTML = '<div class="col-span-full text-center py-3 text-gray-500 text-xs">No episodes</div>'; return; }
    
    el.innerHTML = eps.map(ep => `
      <button onclick="playEp(${season}, ${ep.episode_number}, this)" class="ep-btn p-2.5 rounded-xl text-center ${ep.episode_number===curEpisode && curSeason===season ? 'on' : ''}">
        <div class="text-[10px] text-gray-400 mb-0.5">EP ${ep.episode_number}</div>
        <div class="text-[10px] font-medium line-clamp-1 group-hover:text-primary">${ep.name || `Episode ${ep.episode_number}`}</div>
      </button>
    `).join('');
    
  } catch (e) {
    el.innerHTML = '<div class="col-span-full text-center py-3 text-red-400/80 text-xs">Failed</div>';
  }
};

// ===== PLAYER =====
const playAnime = item => {
  currentItem = item;
  curSeason = 1;
  curEpisode = 1;
  curServer = 1;
  
  $('playTitle').textContent = item.name;
  $('playRating').textContent = (item.vote_average || 0).toFixed(1);
  $('playDate').textContent = item.first_air_date ? item.first_air_date.split('-')[0] : '';
  $('playDesc').textContent = item.overview || 'No description.';
  $('curSeason').textContent = '1';
  $('playSeason').textContent = 'S1 E1';
  
  if (item.number_of_seasons > 0) {
    $('epSelector').classList.remove('hidden');
    loadEps(1);
  } else {
    $('epSelector').classList.add('hidden');
  }
  
  updatePlayer();
  saveProgress(item, 1, 1);
  goPlayer();
};

const updatePlayer = () => {
  const iframe = $('playerFrame');
  const id = currentItem?.id;
  if (!id) return;
  
  const servers = [
    `https://vidsrc.to/embed/tv/${id}/${curSeason}/${curEpisode}/`,
    `https://www.2embed.cc/embedtv/${id}?s=${curSeason}&e=${curEpisode}`,
    `https://multiembed.mov/directstream.php?video_id=${id}&s=${curSeason}&e=${curEpisode}`,
    `https://pexe411qok.com/${id}?s=${curSeason}&e=${curEpisode}`
  ];
  
  iframe.src = servers[curServer - 1];
  document.querySelectorAll('.srv-btn').forEach((b, i) => b.classList.toggle('on', i + 1 === curServer));
};

const switchServer = n => {
  curServer = n;
  updatePlayer();
  toast(`Server ${n} selected`);
};

const playEp = (season, episode, btn) => {
  curSeason = season;
  curEpisode = episode;
  $('curSeason').textContent = season;
  $('playSeason').textContent = `S${season} E${episode}`;
  document.querySelectorAll('#epButtons .ep-btn').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  updatePlayer();
  saveProgress(currentItem, season, episode);
  toast(`Playing S${season} E${episode}`);
};

const changeSeason = delta => {
  if (!currentItem) return;
  const newS = curSeason + delta;
  if (newS >= 1 && newS <= currentItem.number_of_seasons) {
    loadEps(newS);
  }
};

const saveProgress = (item, season, episode) => {
  setLS('progress', { id: item.id, name: item.name, season, episode, time: Date.now() });
};

// ===== WATCHLIST =====
const toggleWatchlist = (item, btn) => {
  let wl = getLS('wl');
  const idx = wl.findIndex(a => a.id === item.id);
  if (idx === -1) {
    wl.unshift({ id: item.id, name: item.name, poster_path: item.poster_path });
    toast('✓ Added to watchlist');
    if (btn) btn.innerHTML = '<svg class="w-4 h-4 text-primary" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg> In List';
  } else {
    wl.splice(idx, 1);
    toast('Removed from watchlist');
    if (btn) btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg> Add to List';
  }
  setLS('wl', wl);
};

// ===== SEARCH =====
const toggleSearch = () => {
  $('searchOverlay').classList.toggle('open');
  if ($('searchOverlay').classList.contains('open')) {
    $('searchInput').focus();
    $('searchInput').value = '';
    $('searchResults').innerHTML = '<div class="text-center text-gray-500 pt-12">Type to search anime...</div>';
  }
};

$('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) {
    $('searchResults').innerHTML = '<div class="text-center text-gray-500 pt-12">Type at least 2 characters...</div>';
    return;
  }
  $('searchResults').innerHTML = '<div class="flex justify-center py-8"><div class="w-6 h-6 border-2 border-primary/30 border-t-primary rounded-full animate-spin"></div></div>';
  
  searchTimer = setTimeout(async () => {
    try {
      const data = await api('/search/tv', { query: q });
      const items = data.results.filter(isAnime).slice(0, 20);
      if (items.length === 0) {
        $('searchResults').innerHTML = '<div class="text-center text-gray-500 pt-12">No results found</div>';
        return;
      }
      $('searchResults').innerHTML = items.map(item => {
        const p = item.poster_path ? `${IMG}${item.poster_path}` : NO_IMG;
        return `
          <div class="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl cursor-pointer transition" onclick="pickSearch(${item.id})">
            <img src="${p}" class="w-14 h-20 object-cover rounded-lg" onerror="this.src='${NO_IMG}'">
            <div class="flex-1 min-w-0">
              <h4 class="font-medium text-sm line-clamp-1">${item.name}</h4>
              <p class="text-xs text-gray-400 line-clamp-2 mt-1">${item.overview?.slice(0,100)||''}</p>
              <div class="flex items-center gap-2 mt-1.5 text-xs text-gray-500">
                <span class="flex items-center gap-1">⭐ ${(item.vote_average||0).toFixed(1)}</span>
                <span>•</span>
                <span>${item.first_air_date ? item.first_air_date.split('-')[0] : ''}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    } catch (e) {
      $('searchResults').innerHTML = '<div class="text-center text-red-400/80 py-4 text-sm">Search failed</div>';
    }
  }, 300);
});

const pickSearch = id => {
  toggleSearch();
  openDetails(id);
};

// ===== LAZY LOAD =====
const loadImages = container => {
  const imgs = container.querySelectorAll('img[data-src]:not(.card-img)');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        img.src = img.dataset.src;
        img.classList.add('card-img');
        obs.unobserve(img);
      }
    });
  }, { rootMargin: '50px' });
  imgs.forEach(img => obs.observe(img));
};

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $('searchOverlay').classList.contains('open')) toggleSearch();
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); toggleSearch(); }
});

// Close mobile menu on outside click
document.addEventListener('click', e => {
  const menu = $('mobileMenu');
  if (!menu.classList.contains('hidden') && !menu.contains(e.target) && !e.target.closest('[aria-label="Menu"]')) {
    menu.classList.add('hidden');
  }
});

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  if (API_KEY === 'YOUR_TMDB_API_KEY') {
    $('heroTitle').textContent = '🔑 API Key Missing';
    $('heroDesc').textContent = 'Open this HTML file in a text editor and replace YOUR_TMDB_API_KEY with your TMDB API key.';
  }
  loadHome();
  loadImages(document);
});
</script>
</body>
</html>
